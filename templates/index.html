<!doctype html>
<html>
  <head>
    <title>Toxic Comment Detector</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 50px;
      }

      textarea {
        width: 400px;
        height: 100px;
      }

      button {
        padding: 10px 20px;
        margin-top: 10px;
      }

      .result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h2>Toxic Comment Detector</h2>

    <form action="/predict" method="post">
      <textarea name="text" placeholder="Enter your text..."></textarea><br />
      <button type="submit">Check</button>
    </form>

    {% if result %}
    <div class="result" style="color: red">
      Result: {{ result }} <br />
      Score: {{ score }}/10
    </div>
    {% endif %}
  </body>
</html>
